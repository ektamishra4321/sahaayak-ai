name: CI
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Unit tests (no API keys needed)
        run: pytest tests/ -q
      - name: Routing eval - heuristic baseline must stay above 90%
        run: python eval/run_eval.py --heuristic
      - name: Retrieval eval - grounding and refusal gates
        run: |
          python -m rag.ingest --reset
          python eval/retrieval_eval.py
